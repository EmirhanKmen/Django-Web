{% extends "base.html" %}
{% block title %}Harita Gorunumu - SAHAF{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    #map-container{height:calc(100vh - 180px);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
    .leaflet-popup-content-wrapper{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg)}
    .leaflet-popup-tip{background:var(--bg-card)}
    .popup-title{font-weight:700;font-size:1rem;margin-bottom:0.3rem}
    .popup-meta{font-size:0.8rem;color:var(--text-secondary)}
    .popup-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:700}
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Harita Gorunumu</h1>
        <p class="page-subtitle">Anketlerin cografi dagilimi</p>
    </div>
    <a href="{% url 'dashboard:index' %}" class="btn btn-outline btn-sm">Panele Don</a>
</div>
<div id="map-container"></div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map-container').setView([39.0, 35.0], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap, © CARTO', maxZoom: 19
}).addTo(map);

const surveys = {{ surveys_data|safe }};
const priorityColors = {LOW:'#00F0A0',MEDIUM:'#3B82F6',HIGH:'#FFB800',CRITICAL:'#FF4D6A'};

surveys.forEach(s => {
    if(s.latitude && s.longitude) {
        const color = priorityColors[s.priority] || '#00F0A0';
        const marker = L.circleMarker([parseFloat(s.latitude), parseFloat(s.longitude)], {
            radius: 8 + Math.min(s.total_responses, 20),
            fillColor: color, color: color, weight: 2, opacity: 0.8, fillOpacity: 0.4
        }).addTo(map);
        marker.bindPopup(`
            <div class="popup-title">${s.title}</div>
            <div class="popup-meta">${s.location_name || 'Konum belirtilmemis'}</div>
            <div class="popup-meta" style="margin-top:0.3rem">
                <span class="popup-badge" style="background:${color}22;color:${color}">${s.priority}</span>
                · ${s.total_responses} yanit
            </div>
            <a href="/surveys/${s.slug}/" style="display:inline-block;margin-top:0.5rem;font-size:0.8rem">Ankete Git</a>
        `);
    }
});
</script>
{% endblock %}
